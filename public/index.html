<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- FIX: viewport-fit=cover lets content draw edge-to-edge under notch/status bar
         (needed for safe-area-inset-* to work properly), maximum-scale=1 + user-scalable=no
         stops the phone zooming in when you tap an input field — this alone makes a big
         difference to the "is this an app or a website" feeling -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- FIX: theme-color ab app ke actual dark background se match karta hai (pehle #000000
         tha, alag se manifest.json mein #B8860B tha — dono mismatch, status bar galat dikhta tha) -->
    <meta name="theme-color" content="#070B14" />
    <meta name="description" content="KanlaERP - Professional Bullion Trading Management System" />

    <!-- FIX: iOS ke liye standalone app behavior + status bar ka style dark rakha,
         taaki iPhone pe bhi "Add to Home Screen" karne par poori tarah app jaisa khule -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kanla" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Kanla Corporation</title>

    <!-- FIX: pehle yahan Inter ke saath saath DM Serif Display + Plus Jakarta Sans bhi
         load ho rahe the jo kahin use hi nahi hote (poora CSS sirf Inter use karta hai) —
         unnecessary load time hata diya, sirf Inter reh gaya -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
